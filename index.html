<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FCFBF9">
<title>Raise Route · Ready to Raise? — pitchIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --red:       #BF2026;
    --red-dark:  #7D1F23;
    --red-tint:  #FEE2E3;
    --red-faint: #fff2f2;
    --navy:      #1A1847;
    --green:     #0A994A;
    --green-tint:#e6f4ec;
    --paper:     #FCFBF9;
    --ink:       #333333;
    --body:      #6a6a6a;
    --hairline:  #e7e7e7;
    --serif: "Fraunces", Georgia, serif;
    --sans:  "Inter", -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    background:var(--paper);
    font-family:var(--sans);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }

  .shell{
    max-width:430px;
    margin:0 auto;
    padding:0 22px 110px;
    min-height:100vh;
    display:flex; flex-direction:column;
  }

  /* ---------- masthead ---------- */
  .masthead{ padding-top:calc(18px + env(safe-area-inset-top)); }
  .masthead .row{
    display:flex; justify-content:space-between; align-items:center;
  }
  .wordmark img{ display:block; height:19px; width:auto; }
  .hero-logo{ margin:2px 0 24px; }
  .hero-logo img{ display:block; height:56px; width:auto; }
  .masthead .section{
    font-size:9px; font-weight:600;
    letter-spacing:0.24em; text-transform:uppercase;
    color:var(--body);
  }
  .masthead .line{ height:1px; background:var(--hairline); margin-top:12px; }

  /* ---------- sync dot ---------- */
  .sync{
    position:fixed; top:calc(10px + env(safe-area-inset-top)); right:10px;
    width:7px; height:7px; border-radius:50%;
    background:var(--green); opacity:.75; z-index:50;
    transition:background .3s;
  }
  .sync.pending{ background:#E18437; animation:pulse 1.4s ease-in-out infinite; }
  .sync.offline{ background:#b6b3ac; }
  @keyframes pulse{ 0%,100%{opacity:.9} 50%{opacity:.3} }

  /* ---------- progress: your raise route ---------- */
  .progress{ margin:18px 0 6px; }
  .progress .plabel{
    font-size:9px; font-weight:600; letter-spacing:0.26em;
    text-transform:uppercase; color:var(--body);
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:10px;
  }
  .progress .plabel b{ color:var(--red); font-weight:600; }
  .route-line{
    display:flex; align-items:center;
  }
  .route-node{
    width:9px; height:9px; border-radius:50%;
    border:1.5px solid #d8d5cf; background:var(--paper);
    flex:none; transition:all .3s;
  }
  .route-node.done{ background:var(--red); border-color:var(--red); }
  .route-node.now{
    border-color:var(--red); background:var(--paper);
    box-shadow:0 0 0 3.5px var(--red-tint);
  }
  .route-seg{
    flex:1; height:1.5px; background:#d8d5cf; transition:background .3s;
  }
  .route-seg.done{ background:var(--red); }

  /* ---------- step frame ---------- */
  .step{ padding-top:22px; flex:1; display:flex; flex-direction:column; }
  .backlink{
    align-self:flex-start;
    background:none; border:none; cursor:pointer;
    font-family:var(--sans);
    font-size:10.5px; font-weight:600; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--body);
    padding:4px 0; margin-bottom:14px;
  }
  .backlink:active{ color:var(--red-dark); }
  .kicker{
    display:flex; align-items:center; gap:11px;
    font-size:10px; font-weight:600;
    letter-spacing:0.26em; text-transform:uppercase;
    color:var(--navy);
  }
  .kicker::before{
    content:""; display:block;
    width:26px; height:2px; background:var(--red); flex:none;
  }
  .kicker .cp{ color:var(--body); font-weight:500; }
  h1.title{
    font-family:var(--serif);
    font-optical-sizing:auto;
    font-size:30px; font-weight:540;
    letter-spacing:-0.015em; line-height:1.12;
    color:var(--navy);
    margin:14px 0 0;
  }
  h1.title em{ font-style:italic; font-weight:440; color:var(--red); }
  .lede{
    margin-top:10px;
    font-size:14px; line-height:1.55; color:var(--body);
  }
  .lede em{ font-family:var(--serif); font-style:italic; color:var(--ink); }

  /* ---------- form ---------- */
  .form{ margin-top:24px; }
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:9.5px; font-weight:600; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--body);
    margin-bottom:6px;
  }
  .field label .opt{ color:#b6b3ac; letter-spacing:0.12em; }
  .field input{
    width:100%;
    font-family:var(--sans); font-size:16px; color:var(--navy);
    background:#fff;
    border:1px solid var(--hairline); border-radius:0;
    padding:13px 14px;
    outline:none;
    transition:border-color .2s;
    -webkit-appearance:none; appearance:none;
  }
  .field input:focus{ border-color:var(--navy); }
  .field input.err{ border-color:var(--red); background:var(--red-faint); }
  .field .errmsg{
    display:none;
    font-size:11.5px; color:var(--red-dark); margin-top:5px;
  }
  .field.show-err .errmsg{ display:block; }

  /* ---------- chips ---------- */
  .chips{ margin-top:22px; display:flex; flex-direction:column; gap:10px; }
  .chip{
    text-align:left;
    background:#fff;
    border:1px solid var(--hairline);
    border-left:2px solid var(--hairline);
    padding:14px 16px;
    cursor:pointer;
    font-family:var(--sans);
    width:100%;
    transition:border-color .15s, background .15s;
    display:block;
  }
  .chip .cname{
    font-size:14.5px; font-weight:500; color:var(--navy);
    letter-spacing:0.003em; line-height:1.35;
    display:flex; align-items:baseline; gap:8px;
  }
  .chip .cname .tag{
    margin-left:auto; flex:none;
    font-size:8.5px; font-weight:600; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--body);
  }
  .chip .csub{
    font-size:12px; color:var(--body); line-height:1.45; margin-top:4px;
  }
  .chip.sel{
    border-color:var(--red); border-left:2px solid var(--red);
    background:var(--red-faint);
  }
  .chip.sel .cname{ color:var(--red-dark); }
  .chip.sel .cname .tag{ color:var(--red); }
  .pickhint{
    margin-top:12px;
    font-size:11px; color:#9a968e; letter-spacing:0.04em; text-align:center;
  }

  /* ---------- buttons ---------- */
  .actions{ margin-top:26px; }
  .btn{
    display:block; width:100%;
    font-family:var(--sans);
    font-size:12px; font-weight:600;
    letter-spacing:0.2em; text-transform:uppercase;
    padding:16px 18px;
    cursor:pointer;
    border:none; border-radius:0;
    transition:opacity .2s, background .2s;
  }
  .btn.primary{ background:var(--navy); color:var(--paper); }
  .btn.primary:disabled{ opacity:.25; cursor:default; }
  .btn.ghost{
    background:transparent; color:var(--body);
    border:1px solid var(--hairline);
    margin-top:10px;
  }
  .hint{
    text-align:center; font-size:11px; color:#9a968e;
    margin-top:14px; letter-spacing:0.02em;
  }

  /* ---------- yes / no ---------- */
  .counter{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:#9a968e;
    margin-top:26px;
  }
  .qtext{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:23px; font-weight:520; letter-spacing:-0.01em;
    line-height:1.25; color:var(--navy);
    margin-top:10px; min-height:86px;
  }
  .yn{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin-top:26px;
  }
  .yn button{
    font-family:var(--sans);
    font-size:13px; font-weight:600;
    letter-spacing:0.18em; text-transform:uppercase;
    padding:20px 10px;
    background:#fff; color:var(--navy);
    border:1px solid var(--hairline);
    cursor:pointer;
    transition:all .15s;
  }
  .yn button:active{ border-color:var(--red); background:var(--red-faint); color:var(--red-dark); }
  .qdots{ display:flex; gap:6px; margin-top:22px; }
  .qdot{ width:6px; height:6px; border-radius:50%; background:#ddd9d2; }
  .qdot.done{ background:var(--red); }

  /* ---------- rate 3-way ---------- */
  .rate{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
    margin-top:26px;
  }
  .rate button{
    font-family:var(--sans);
    font-size:11px; font-weight:600;
    letter-spacing:0.14em; text-transform:uppercase;
    padding:18px 4px;
    background:#fff; color:var(--navy);
    border:1px solid var(--hairline);
    cursor:pointer;
    transition:all .15s;
  }
  .rate button:active{ border-color:var(--red); background:var(--red-faint); color:var(--red-dark); }

  /* ---------- verdict card ---------- */
  .verdict{
    margin-top:26px;
    background:var(--navy);
    border-left:3px solid var(--red);
    padding:24px 22px 22px;
    color:var(--paper);
  }
  .verdict.good{ border-left-color:var(--green); }
  .verdict .vkicker{
    font-size:9px; font-weight:600; letter-spacing:0.28em;
    text-transform:uppercase; color:rgba(252,251,249,.55);
  }
  .verdict h2{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:21px; font-weight:540; letter-spacing:-0.01em;
    line-height:1.22; margin-top:10px;
    color:#fff;
  }
  .verdict h2 .vaccent{ color:var(--red-tint); }
  .verdict.good h2 .vaccent{ color:#a8e6c4; }
  .verdict p{
    margin-top:12px;
    font-size:13px; line-height:1.6; color:rgba(252,251,249,.78);
  }
  .verdict .score{
    font-family:var(--serif); font-size:13px; font-style:italic;
    color:rgba(252,251,249,.6); margin-top:14px;
  }

  /* ---------- waiting (presenter gate) ---------- */
  .waitbox{
    margin-top:30px;
    border:1px dashed #d8d5cf;
    padding:34px 24px 30px;
    text-align:center;
  }
  .waitbox .bignod{ font-size:34px; line-height:1; }
  .waitbox .wtitle{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:22px; font-weight:540; letter-spacing:-0.01em;
    line-height:1.25; color:var(--navy);
    margin-top:14px;
  }
  .waitbox .wtitle em{ font-style:italic; color:var(--red); }
  .waitbox .wsub{
    margin-top:10px; font-size:13px; line-height:1.55; color:var(--body);
  }
  .waitdots{ display:flex; gap:8px; justify-content:center; margin-top:22px; }
  .waitdots span{
    width:7px; height:7px; border-radius:50%; background:var(--red);
    animation:wpulse 1.3s ease-in-out infinite;
  }
  .waitdots span:nth-child(2){ animation-delay:.22s; }
  .waitdots span:nth-child(3){ animation-delay:.44s; }
  @keyframes wpulse{ 0%,100%{opacity:.15} 50%{opacity:.9} }

  /* ---------- Q&A fab + sheet ---------- */
  .qa-fab{
    position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    z-index:60;
    display:none;
    font-family:var(--sans);
    font-size:10.5px; font-weight:600; letter-spacing:0.16em;
    text-transform:uppercase;
    background:var(--navy); color:var(--paper);
    border:none; border-radius:999px;
    padding:13px 18px;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(26,24,71,.28);
  }
  .qa-fab.show{ display:block; }
  .qa-fab .q{ color:var(--red-tint); margin-right:6px; font-family:var(--serif); font-style:italic; text-transform:none; font-size:13px; letter-spacing:0; }
  .qa-veil{
    position:fixed; inset:0; z-index:70;
    background:rgba(26,24,71,.45);
    display:none;
  }
  .qa-veil.show{ display:block; }
  .qa-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:71;
    background:var(--paper);
    border-top:2px solid var(--red);
    padding:22px 22px calc(22px + env(safe-area-inset-bottom));
    max-width:430px; margin:0 auto;
    transform:translateY(105%);
    transition:transform .28s cubic-bezier(.22,.9,.35,1);
  }
  .qa-veil.show .qa-sheet{ transform:none; }
  .qa-sheet .qk{
    font-size:10px; font-weight:600; letter-spacing:0.26em;
    text-transform:uppercase; color:var(--navy);
    display:flex; align-items:center; gap:11px;
  }
  .qa-sheet .qk::before{ content:""; width:26px; height:2px; background:var(--red); }
  .qa-sheet textarea{
    width:100%; margin-top:14px;
    font-family:var(--sans); font-size:16px; color:var(--navy);
    background:#fff; border:1px solid var(--hairline);
    padding:13px 14px; min-height:96px; resize:vertical;
    outline:none; border-radius:0;
    -webkit-appearance:none; appearance:none;
  }
  .qa-sheet textarea:focus{ border-color:var(--navy); }
  .qa-sheet .qhint{ font-size:11px; color:#9a968e; margin-top:8px; }
  .qa-sheet .qrow{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
  .qa-sent{
    display:none;
    margin-top:14px; padding:12px 14px;
    background:var(--green-tint); border:1px solid #bfe4cf;
    font-size:12.5px; color:#0a6e38; text-align:center;
  }
  .qa-sent.show{ display:block; }

  /* ---------- final route card ---------- */
  .cardwrap{ margin-top:24px; }
  .route-card{
    background:#fff;
    border:1px solid var(--hairline);
    box-shadow:0 1px 2px rgba(26,24,71,.06), 0 16px 40px -18px rgba(26,24,71,.22);
  }
  .rc-head{
    background:var(--navy);
    padding:16px 20px 14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .rc-head .wm img{ display:block; height:34px; width:auto; }
  .rc-head .lbl{
    font-size:8.5px; font-weight:600; letter-spacing:0.28em;
    text-transform:uppercase; color:rgba(252,251,249,.55);
  }
  .rc-id{
    padding:20px 20px 16px;
    border-bottom:1px dashed #d8d5cf;
    position:relative;
  }
  .rc-id::before,.rc-id::after{
    content:""; position:absolute; bottom:-7px;
    width:14px; height:14px; border-radius:50%;
    background:var(--paper); border:1px solid var(--hairline);
  }
  .rc-id::before{ left:-8px; }
  .rc-id::after{ right:-8px; }
  .rc-id .pass{
    font-size:8.5px; font-weight:600; letter-spacing:0.26em;
    text-transform:uppercase; color:var(--red);
  }
  .rc-id .nm{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:24px; font-weight:540; letter-spacing:-0.01em;
    color:var(--navy); margin-top:6px; line-height:1.15;
  }
  .rc-id .co{ font-size:12.5px; color:var(--body); margin-top:3px; }
  .rc-route{ padding:18px 20px 6px; }
  .rc-stop{
    display:flex; gap:14px;
    position:relative;
    padding-bottom:16px;
  }
  .rc-stop .marker{
    width:9px; display:flex; flex-direction:column; align-items:center; flex:none;
    padding-top:4px;
  }
  .rc-stop .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--red); flex:none;
  }
  .rc-stop .stem{
    width:1.5px; flex:1; background:#e3e0da; margin-top:4px;
  }
  .rc-stop:last-child .stem{ display:none; }
  .rc-stop .slab{
    font-size:8.5px; font-weight:600; letter-spacing:0.2em;
    text-transform:uppercase; color:#9a968e;
  }
  .rc-stop .sval{
    font-size:14px; font-weight:600; color:var(--navy);
    margin-top:2px; line-height:1.3;
  }
  .rc-stop .sval.vgreen{ color:var(--green); }
  .rc-stop .sval.vred{ color:var(--red); }
  .rc-rec{
    margin:6px 20px 0;
    padding:14px 0 18px;
    border-top:1px solid var(--hairline);
    font-family:var(--serif); font-optical-sizing:auto;
    font-style:italic; font-size:14.5px; font-weight:440;
    line-height:1.55; color:var(--ink);
  }
  .rc-rec b{ font-style:normal; font-weight:560; color:var(--red); }
  .rc-foot{
    padding:13px 20px 15px;
    border-top:1px solid var(--hairline);
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:10px; color:var(--body); letter-spacing:0.03em;
  }
  .rc-foot .talk{ color:var(--navy); font-weight:600; }
  .rc-foot .talk .u{ color:var(--red); }

  .savehint{
    display:none;
    margin-top:12px; padding:12px 14px;
    background:var(--red-faint); border:1px solid var(--red-tint);
    font-size:12px; color:var(--red-dark); line-height:1.5; text-align:center;
  }
  .savehint.show{ display:block; }

  .donote{
    margin-top:22px; text-align:center;
    font-family:var(--serif); font-style:italic;
    font-size:14px; color:var(--body); line-height:1.6;
  }
  .donote b{ font-style:normal; font-weight:560; color:var(--navy); }

  /* fade-in per step */
  .step{ animation:rise .35s ease both; }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:none; }
  }
</style>
</head>
<body>
  <div class="sync" id="syncDot" title="Sync status"></div>
  <div class="shell">
    <header class="masthead">
      <div class="row">
        <div class="wordmark"><img src="pitchin_logo_text.svg" alt="pitchIN"></div>
        <div class="section">Ready to Raise?</div>
      </div>
      <div class="line"></div>
    </header>

    <div class="progress" id="progress" style="display:none">
      <div class="plabel"><span>Your <b>Raise Route</b></span><span id="pcount"></span></div>
      <div class="route-line" id="routeLine"></div>
    </div>

    <main id="app"></main>
  </div>

  <button class="qa-fab" id="qaFab" type="button"><span class="q">?</span>Ask a question</button>
  <div class="qa-veil" id="qaVeil">
    <div class="qa-sheet">
      <div class="qk">Ask Nicholas a question</div>
      <textarea id="qaText" placeholder="Type it here — it lands on the presenter screen, with your name on it." maxlength="500"></textarea>
      <div class="qhint">Asked as you — questions go to the live Q&amp;A feed.</div>
      <div class="qa-sent" id="qaSent">Sent — it's in the Q&amp;A queue. 👌</div>
      <div class="qrow">
        <button class="btn ghost" id="qaCancel" style="margin-top:0">Close</button>
        <button class="btn primary" id="qaSend">Send it</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  /* ================= config ================= */
  var SUPA_URL = "https://hhqlzcvwalwuxrrolevv.supabase.co";
  var SUPA_KEY = "sb_publishable_oNq7GfsgbZKELDhQbaRz_g_ctOO0v0p";
  var sb = null;
  try {
    // fetch proxy: identical to native fetch, but lets `window.__rrOffline = true`
    // simulate a dead network (used to test the fail-open gate + offline queue)
    var _realFetch = window.fetch ? window.fetch.bind(window) : undefined;
    var _fetchProxy = _realFetch ? function(){
      if(window.__rrOffline) return Promise.reject(new TypeError("Simulated offline"));
      return _realFetch.apply(null, arguments);
    } : undefined;
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth:{ persistSession:false, autoRefreshToken:false },
      global: _fetchProxy ? { fetch:_fetchProxy } : {}
    });
  }
  catch(e){ console.warn("supabase client unavailable", e); }

  /* ================= device id ================= */
  function deviceId(){
    var id = localStorage.getItem("rr_device_id");
    if(!id){
      id = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
         : "d-" + Date.now() + "-" + Math.random().toString(16).slice(2);
      localStorage.setItem("rr_device_id", id);
    }
    return id;
  }
  var DEVICE = deviceId();

  /* ================= state ================= */
  var DEFAULT = {
    screen:"register", lead:{}, answers:{},
    cp1:{ instrument:null, rails:[] },
    cp2:{ i:0, q:{} },
    cp3:{ layers:[] },
    cp4:{ i:0, pts:[] }
  };
  function loadState(){
    try{
      var s = JSON.parse(localStorage.getItem("rr_state_v2"));
      if(s && s.screen) return s;
    }catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT));
  }
  var S = loadState();
  function save(){ localStorage.setItem("rr_state_v2", JSON.stringify(S)); }

  /* ================= offline queue ================= */
  var QKEY = "rr_queue_v2";
  function loadQ(){ try{ return JSON.parse(localStorage.getItem(QKEY)) || []; }catch(e){ return []; } }
  function saveQ(q){ localStorage.setItem(QKEY, JSON.stringify(q)); }
  function setDot(){
    var d = document.getElementById("syncDot");
    var q = loadQ();
    if(!navigator.onLine){ d.className = "sync offline"; d.title = "Offline — answers saved on this phone"; }
    else if(q.length){ d.className = "sync pending"; d.title = "Syncing…"; }
    else { d.className = "sync"; d.title = "Synced"; }
  }
  function enqueue(job){
    var q = loadQ(); q.push(job); saveQ(q); setDot(); flush();
  }
  var flushing = false;
  function flush(){
    if(flushing || !sb) return;
    var q = loadQ();
    if(!q.length){ setDot(); return; }
    flushing = true;
    (function next(){
      var q2 = loadQ();
      if(!q2.length){ flushing = false; setDot(); return; }
      sendJob(q2[0]).then(function(ok){
        if(ok){
          var q3 = loadQ(); q3.shift(); saveQ(q3);
          next();
        } else {
          flushing = false; setDot();
        }
      });
    })();
  }
  function sendJob(job){
    try{
      if(job.t === "lead"){
        return sb.from("leads").insert(job.p).then(function(res){
          if(!res.error) return true;
          var m = ("" + (res.error.message||"")).toLowerCase();
          if(res.error.code === "23505" || m.indexOf("duplicate") >= 0) return true; // already registered
          console.warn("lead insert failed", res.error);
          return false;
        }, function(){ return false; });
      }
      if(job.t === "q"){
        return sb.from("questions").insert(job.p).then(function(res){
          if(!res.error) return true;
          console.warn("question insert failed", res.error);
          return false;
        }, function(){ return false; });
      }
      return sb.from("answers").upsert(job.p, { onConflict:"device_id,checkpoint" }).then(function(res){
        if(!res.error) return true;
        console.warn("answer upsert failed", res.error);
        return false;
      }, function(){ return false; });
    }catch(e){ return Promise.resolve(false); }
  }

  var GATE = { open:null }; // null = unknown => open

  function gateClosed(need){
    return GATE.open !== null && GATE.open < need;
  }
  function fetchGate(cb){
    if(!sb){ GATE.open = null; if(cb) cb(); return; }
    try{
      sb.from("session_state").select("open_checkpoint").eq("id", 1).single().then(function(res){
        GATE.open = (res.error || !res.data) ? null : res.data.open_checkpoint;
        if(cb) cb();
      }, function(){ GATE.open = null; if(cb) cb(); });
    }catch(e){ GATE.open = null; if(cb) cb(); }

  /* ---------- perimeter verdict (Malaysia-localised; pure) ---------- */

  function perimeterVerdict(q){

  }

  function byKey(list, k){ for(var i=0;i<list.length;i++){ if(list[i].k===k) return list[i]; } return null; }
  function shorts(list, keys){
    return (keys || []).map(function(k){ var o = byKey(list, k); return o ? o.s : k; });
  }

  function recommendation(){
    var a = S.answers;
    var perim = a.cp2 ? a.cp2.verdict : "";
    var rails = (a.cp1 && a.cp1.rails) || [];
    var layers = (a.cp3 && a.cp3.layers) || [];
    var worth = a.cp4 ? a.cp4.verdict : "";

    var perimSentence = {
      fundraising: "You're inside the securities perimeter — pick the instrument's regulated rail and plan the real timeline.",
      asset:       "Structure the legal wrapper before anything else — the asset's own regime plus AMLA govern.",
      product:     "You're likely in product territory — keep fundraising features out and let the product do the talking.",
      grey:        "You're in the grey zone — document your position with counsel, then innovate ahead."
    }[perim] || "Map your perimeter position with counsel first.";

    var railNames = shorts(RAILS, rails.filter(function(k){ return k !== "none"; }));
    var railSentence = railNames.length
      ? "You're weighing " + railNames.join(" + ") + " — line up what each rail demands before you need it."
      : "No rail picked yet — leave today with a shortlist of two.";

    var layerNames = shorts(LAYERS, layers.filter(function(k){ return k !== "partner"; }));
    var weakClause = layerNames.length
      ? "Shore up your weakest layer" + (layerNames.length > 1 ? "s" : "") + " — " + layerNames.join(" and ") + " — before launch"
      : "Partner for the full stack and keep your team on the business";

    var worthClause = {
      launch:     "<b>the token earns its place — design it properly.</b>",
      borderline: "<b>build the product first — token later.</b>",
      notyet:     "<b>build without the token for now.</b>"
    }[worth] || "<b>run the numbers before you commit.</b>";

    return perimSentence + " " + railSentence + " " + weakClause + ", and " + worthClause;
  }

      html += '<div class="' + cls + '"></div>';

  /* ================= rendering helpers ================= */

  function backHTML(){ return '<button type="button" class="backlink" id="backBtn">&#8592; Back</button>'; }
  function bindBack(fn){

  function chipHTML(list, selectedArr, withTag){
    var selected = selectedArr || [];
    var h = '<div class="chips">';
    list.forEach(function(o){
      var isSel = selected.indexOf(o.k) >= 0;
      h += '<button type="button" class="chip' + (isSel ? " sel" : "") + '" data-k="' + o.k + '">' +
        '<span class="cname">' + esc(o.n) + (withTag && o.tag ? '<span class="tag">' + esc(o.tag) + "</span>" : "") + "</span>" +
        (o.sub ? '<span class="csub">' + esc(o.sub) + "</span>" : "") +
        "</button>";
    });
    return h + "</div>";
  }

  function chipStep(opts){
    app.innerHTML =
      '<div class="step">' +
        (opts.back ? backHTML() : "") +
        '<div class="kicker">' + opts.kicker + ' <span class="cp">· ' + opts.cp + "</span></div>" +
        '<h1 class="title">' + opts.title + "</h1>" +
        (opts.lede ? '<p class="lede">' + opts.lede + "</p>" : "") +
        chipHTML(opts.list, opts.selected ? [opts.selected] : [], opts.tags) +
        '<div class="actions"><button class="btn primary" id="cont" ' + (opts.selected ? "" : "disabled") + ">" + (opts.cta || "Lock it in") + "</button></div>" +
      "</div>";
    bindBack(opts.back);
    var sel = opts.selected || null;
    app.querySelectorAll(".chip").forEach(function(ch){
      ch.addEventListener("click", function(){
        sel = ch.getAttribute("data-k");
        app.querySelectorAll(".chip").forEach(function(x){ x.classList.remove("sel"); });
        ch.classList.add("sel");
        document.getElementById("cont").disabled = false;
      });
    });
    document.getElementById("cont").addEventListener("click", function(){
      if(sel) opts.onDone(sel);
    });
  }

  /* multi-select chips: opts.max (0 = unlimited), opts.exclusive = [keys that clear everything else] */
  function chipStepMulti(opts){
    var sel = (opts.selected || []).slice();
    app.innerHTML =
      '<div class="step">' +
        (opts.back ? backHTML() : "") +
        '<div class="kicker">' + opts.kicker + ' <span class="cp">· ' + opts.cp + "</span></div>" +
        '<h1 class="title">' + opts.title + "</h1>" +
        (opts.lede ? '<p class="lede">' + opts.lede + "</p>" : "") +
        chipHTML(opts.list, sel, opts.tags) +
        (opts.pickhint ? '<p class="pickhint">' + opts.pickhint + "</p>" : "") +
        '<div class="actions"><button class="btn primary" id="cont" ' + (sel.length ? "" : "disabled") + ">" + (opts.cta || "Lock it in") + "</button></div>" +
      "</div>";
    bindBack(opts.back);
    function paint(){
      app.querySelectorAll(".chip").forEach(function(x){
        x.classList.toggle("sel", sel.indexOf(x.getAttribute("data-k")) >= 0);
      });
      document.getElementById("cont").disabled = !sel.length;
    }
    app.querySelectorAll(".chip").forEach(function(ch){
      ch.addEventListener("click", function(){
        var k = ch.getAttribute("data-k");
        var i = sel.indexOf(k);
        if(i >= 0){ sel.splice(i, 1); }
        else if(opts.exclusive && opts.exclusive.indexOf(k) >= 0){ sel = [k]; }
        else {
          sel = sel.filter(function(x){ return !(opts.exclusive && opts.exclusive.indexOf(x) >= 0); });
          if(opts.max && sel.length >= opts.max) sel.shift(); // replace the oldest pick
          sel.push(k);
        }
        paint();
      });
    });
    document.getElementById("cont").addEventListener("click", function(){
      if(sel.length) opts.onDone(sel.slice());
    });
  }

  /* ---------- waiting room (gated) ---------- */

            '<div class="step">' +
              backHTML() +
              '<div class="kicker">Checkpoint 2 <span class="cp">· The perimeter self-test</span></div>' +
              '<div class="counter">Question ' + (i+1) + " of 4</div>" +
              '<div class="qtext">' + esc(CP2Q[i]) + "</div>" +
              '<div class="yn"><button data-v="1">Yes</button><button data-v="0">No</button></div>' +
              '<div class="qdots">' + dots + "</div>" +
            "</div>";
          bindBack(function(){
            if(i > 0){ S.cp2.i = i - 1; save(); render(); }
            else nav("cp1b");
          });
          app.querySelectorAll(".yn button").forEach(function(b){
            b.addEventListener("click", function(){
              S.cp2.q["q" + (i+1)] = b.getAttribute("data-v") === "1";
              S.cp2.i = i + 1; save(); render();
            });
          });
        } else {
          var vk = perimeterVerdict(S.cp2.q);
          var v = CP2V[vk];
          app.innerHTML =
            '<div class="step">' +
              backHTML() +
              '<div class="kicker">Checkpoint 2 <span class="cp">· Verdict</span></div>' +
              '<div class="verdict' + (v.good ? " good" : "") + '">' +
                '<div class="vkicker">Your perimeter verdict</div>' +
                "<h2>" + v.t + "</h2>" +
                "<p>" + v.b + "</p>" +
              "</div>" +
              '<div class="actions">' +
                '<button class="btn primary" id="cont">Next checkpoint</button>' +
                '<button class="btn ghost" id="redo">Retake the test</button>' +
              "</div>" +
            "</div>";
          bindBack(function(){ S.cp2.i = 3; save(); render(); });
          document.getElementById("cont").addEventListener("click", function(){
            saveAnswer("cp2", { q1:!!S.cp2.q.q1, q2:!!S.cp2.q.q2, q3:!!S.cp2.q.q3, q4:!!S.cp2.q.q4, verdict:vk });
            nav("cp3");
          });
          document.getElementById("redo").addEventListener("click", function(){
            S.cp2 = { i:0, q:{} }; save(); render();
          });
        }
        break;
      }

      case "cp3": {
        chipStepMulti({
          kicker:"Checkpoint 3", cp:"Build readiness",
          back:function(){ nav("cp2"); },
          title:"Where is your stack <em>weakest?</em>",
          lede:"Every token launch stands on these layers. Founders always know the answer.",
          list: LAYERS, tags:false,
          max:2, exclusive:["partner"],
          selected: (S.cp3.layers && S.cp3.layers.length ? S.cp3.layers : (S.answers.cp3 && S.answers.cp3.layers)) || [],
          pickhint:"Pick up to 2 — or “partner for all of it”.",
          onDone: function(sel){
            S.cp3.layers = sel; save();
            saveAnswer("cp3", { layers:sel });
            nav("cp4");
          }
        });
        break;
      }

      case "cp4": {
        var si = S.cp4.i;
        if(si < 5){
          var sdots = "";
          for(var sd=0; sd<5; sd++) sdots += '<div class="qdot' + (sd < si ? " done" : "") + '"></div>';
          app.innerHTML =
            '<div class="step">' +
              backHTML() +
              '<div class="kicker">Checkpoint 4 <span class="cp">· Is launching a token worth it?</span></div>' +
              '<div class="counter">Statement ' + (si+1) + " of 5</div>" +
              '<div class="qtext">“' + esc(CP4S[si]) + '”</div>' +
              '<div class="rate">' +
                '<button data-p="2">Agree</button>' +
                '<button data-p="1">Neutral</button>' +
                '<button data-p="0">Disagree</button>' +
              "</div>" +
              '<div class="qdots">' + sdots + "</div>" +
            "</div>";
          bindBack(function(){
            if(si > 0){ S.cp4.i = si - 1; save(); render(); }
            else nav("cp3");
          });
          app.querySelectorAll(".rate button").forEach(function(b){
            b.addEventListener("click", function(){
              S.cp4.pts[si] = parseInt(b.getAttribute("data-p"), 10);
              S.cp4.i = si + 1; save(); render();
            });
          });
        } else {
          var total = S.cp4.pts.reduce(function(a,b){ return a + (b||0); }, 0);
          var wk = worthVerdict(total);
          var v4 = CP4V[wk];
          app.innerHTML =
            '<div class="step">' +
              backHTML() +
              '<div class="kicker">Checkpoint 4 <span class="cp">· Verdict</span></div>' +
              '<div class="verdict' + (v4.good ? " good" : "") + '">' +
                '<div class="vkicker">Is launching a token worth it — for you?</div>' +
                "<h2>" + v4.t + "</h2>" +
                "<p>" + v4.b + "</p>" +
                '<div class="score">Your score: ' + total + " / 10</div>" +
              "</div>" +
              '<div class="actions">' +
                '<button class="btn primary" id="cont">Build my Raise Route</button>' +
                '<button class="btn ghost" id="redo">Redo the scorecard</button>' +
              "</div>" +
            "</div>";
          bindBack(function(){ S.cp4.i = 4; save(); render(); });
          document.getElementById("cont").addEventListener("click", function(){
            saveAnswer("cp4", { scores:S.cp4.pts, total:total, verdict:wk, complete:true });
            nav("card");
          });
          document.getElementById("redo").addEventListener("click", function(){
            S.cp4 = { i:0, pts:[] }; save(); render();
          });
        }
        break;
      }

      case "card": {
        var a = S.answers;
        if(!a.cp5) saveAnswer("cp5", { finale:true }); // completion flag for the room map
        var inst = byKey(INSTRUMENTS, a.cp1 && a.cp1.instrument);
        var railTxt = shorts(RAILS, (a.cp1 && a.cp1.rails) || []).join(" · ") || "—";
        var layerTxt = shorts(LAYERS, (a.cp3 && a.cp3.layers) || []).join(" · ") || "—";
        var pv = a.cp2 ? CP2V[a.cp2.verdict] : null;
        var wv = a.cp4 ? CP4V[a.cp4.verdict] : null;
        app.innerHTML =
          '<div class="step">' +
            backHTML() +
            '<div class="kicker">Your Raise Route <span class="cp">· Complete</span></div>' +
            '<h1 class="title">Route <em>confirmed.</em></h1>' +
            '<div class="cardwrap"><div class="route-card" id="routeCard">' +
              '<div class="rc-head"><div class="wm"><img src="pitchin_logo_white.svg" alt="pitchIN"></div><div class="lbl">Raise Route · Boarding card</div></div>' +
              '<div class="rc-id">' +
                '<div class="pass">Ready to Raise? · Token-X Accelerator</div>' +
                '<div class="nm">' + esc(S.lead.name || "Founder") + "</div>" +
                '<div class="co">' + esc(S.lead.company || "") + "</div>" +
              "</div>" +
              '<div class="rc-route">' +
                rcStop("Instrument", inst ? inst.s : "—", "") +
                rcStop("Rails considered", railTxt, "") +
                rcStop("Perimeter", pv ? pv.word : "—", pv ? pv.cls : "") +
                rcStop("Weakest layers", layerTxt, "") +
                rcStop("Token worth it?", wv ? wv.word : "—", wv ? wv.cls : "") +
              "</div>" +
              '<div class="rc-rec">' + recommendation() + "</div>" +
              '<div class="rc-foot"><span>pitchIN — the private fundraising platform</span><span class="talk">Talk to us: <span class="u">pitchin.my</span></span></div>' +
            "</div></div>" +
            '<div class="savehint" id="saveHint">Couldn’t render the image on this phone — just screenshot this card. It’s yours.</div>' +
            '<div class="actions">' +
              '<button class="btn primary" id="saveImg">Save as image</button>' +
              '<button class="btn ghost" id="done">Done</button>' +
            "</div>" +
            '<p class="donote" id="doneNote" style="display:none">All set — <b>we’ll be in touch.</b><br>Enjoy the rest of the session.</p>' +
          "</div>";
        bindBack(function(){ nav("cp4"); });
        document.getElementById("saveImg").addEventListener("click", saveCardImage);
        document.getElementById("done").addEventListener("click", function(){
          document.getElementById("doneNote").style.display = "";
          document.getElementById("done").style.display = "none";
        });
        break;
      }
    }
  }

  function rcStop(lab, val, cls){
    return '<div class="rc-stop">' +
      '<div class="marker"><div class="dot"></div><div class="stem"></div></div>' +
      '<div><div class="slab">' + lab + '</div><div class="sval ' + cls + '">' + esc(val) + "</div></div>" +
    "</div>";
  }

  /* ---------- save card as image ---------- */
  function saveCardImage(){
    var btn = document.getElementById("saveImg");
    btn.disabled = true; btn.textContent = "Rendering…";
    function fail(){
      btn.disabled = false; btn.textContent = "Save as image";
      document.getElementById("saveHint").classList.add("show");
    }
    function go(){
      try{
        window.html2canvas(document.getElementById("routeCard"), {
          backgroundColor:"#FCFBF9", scale:2, useCORS:true
        }).then(function(canvas){
          try{
            var link = document.createElement("a");
            link.download = "raise-route-" + (S.lead.name||"card").toLowerCase().replace(/[^a-z0-9]+/g,"-") + ".png";
            link.href = canvas.toDataURL("image/png");
            document.body.appendChild(link); link.click(); link.remove();
            btn.disabled = false; btn.textContent = "Saved ✓";
            setTimeout(function(){ btn.textContent = "Save as image"; }, 2500);
          }catch(e){ fail(); }
        }, fail);
      }catch(e){ fail(); }
    }
    if(window.html2canvas) return go();
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
    s.onload = go; s.onerror = fail;
    document.head.appendChild(s);
  }

  /* ================= boot ================= */
  render();
  flush();
  fetchGate(function(){
    var need = GATE_NEED[S.screen];
    if(need != null && gateClosed(need)) render();
  });
})();
</script>
</body>
</html>
