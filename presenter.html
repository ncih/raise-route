<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Route — Live Room Map · pitchIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --red:       #BF2026;
    --red-soft:  #E4555B;
    --red-tint:  #FEE2E3;
    --navy:      #1A1847;
    --navy-deep: #131134;
    --navy-card: #211E55;
    --green:     #0A994A;
    --green-soft:#4CC98A;
    --paper:     #FCFBF9;
    --faint:     rgba(252,251,249,.55);
    --fainter:   rgba(252,251,249,.35);
    --hairline:  rgba(252,251,249,.14);
    --serif: "Fraunces", Georgia, serif;
    --sans:  "Inter", -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:var(--navy-deep);
    color:var(--paper);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }

  .frame{
    height:100vh;
    display:flex; flex-direction:column;
    padding:24px 44px 20px;
    max-width:1920px; margin:0 auto;
  }

  /* ---------- header ---------- */
  header .row{
    display:flex; align-items:center; gap:22px;
  }
  .wordmark img{ display:block; height:40px; width:auto; }
  header h1{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:26px; font-weight:520; letter-spacing:-0.015em;
    color:var(--paper);
  }
  header h1 em{ font-style:italic; font-weight:440; color:var(--red-soft); }
  header .live{
    margin-left:auto;
    display:flex; align-items:center; gap:9px;
    font-size:10.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--faint);
  }
  header .live .dot{
    width:8px; height:8px; border-radius:50%; background:var(--green-soft);
    animation:pulse 1.6s ease-in-out infinite;
  }
  header .live .dot.stale{ background:#E18437; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.25} }
  header .line{ height:1px; background:var(--hairline); margin-top:14px; }

  /* ---------- gate control strip ---------- */
  .control{
    display:flex; align-items:center; gap:16px;
    margin-top:14px;
    border:1px solid var(--hairline);
    border-left:3px solid var(--red);
    background:var(--navy-card);
    padding:10px 18px;
  }
  .control .clab{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--fainter);
    flex:none;
  }
  .gatechips{ display:flex; gap:6px; }
  .gatechips button{
    font-family:var(--sans);
    font-size:10.5px; font-weight:600; letter-spacing:0.14em;
    text-transform:uppercase;
    background:transparent; color:var(--faint);
    border:1px solid var(--hairline);
    padding:7px 13px;
    cursor:pointer;
    transition:all .15s;
  }
  .gatechips button:hover{ border-color:var(--faint); }
  .gatechips button.lit{
    background:var(--red); border-color:var(--red); color:#fff;
  }
  .gatechips button.now{ box-shadow:0 0 0 2px rgba(228,85,91,.45); }
  .opennext{
    font-family:var(--sans);
    font-size:11px; font-weight:600; letter-spacing:0.18em;
    text-transform:uppercase;
    background:var(--paper); color:var(--navy);
    border:none; padding:9px 20px;
    cursor:pointer;
  }
  .opennext:disabled{ opacity:.3; cursor:default; }
  .control .cstate{
    margin-left:auto;
    font-family:var(--serif); font-style:italic;
    font-size:13.5px; color:var(--faint);
  }
  .control .cstate b{ font-style:normal; color:var(--paper); font-weight:600; }

  /* ---------- room map strip ---------- */
  .strip{
    display:grid; grid-template-columns:repeat(5, 1fr);
    gap:1px; background:var(--hairline);
    border:1px solid var(--hairline);
    margin-top:14px;
  }
  .stat{
    background:var(--navy-deep);
    padding:12px 22px 14px;
  }
  .stat .slab{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--fainter);
  }
  .stat .sval{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:28px; font-weight:540; letter-spacing:-0.01em;
    color:var(--paper);
    margin-top:5px; line-height:1.1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .stat .sval .unit{ font-size:15px; color:var(--faint); font-style:italic; font-weight:440; }
  .stat .sval .seg{ font-size:21px; }
  .stat .sval .seg small{
    font-size:9.5px; font-family:var(--sans); font-weight:600;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--fainter);
    margin:0 9px 0 4px;
  }
  .stat .sval .seg small:last-child{ margin-right:0; }
  .stat.hero .sval{ color:var(--red-soft); }

  /* ---------- panels grid ---------- */
  .grid{
    flex:1; min-height:0;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:1fr 1fr;
    gap:14px;
    margin-top:14px;
  }
  .panel{
    background:var(--navy-card);
    border:1px solid var(--hairline);
    border-top:2px solid var(--red);
    padding:16px 24px 14px;
    display:flex; flex-direction:column;
    min-height:0;
    position:relative;
  }
  .panel .phead{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:4px;
  }
  .panel .pk{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--fainter);
  }
  .panel .key{
    font-family:var(--serif); font-style:italic; font-size:13px;
    color:var(--fainter);
  }
  .panel h2{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:18px; font-weight:520; letter-spacing:-0.01em;
    color:var(--paper); line-height:1.15;
    margin-bottom:10px;
  }
  .panel h2 em{ font-style:italic; font-weight:440; color:var(--red-soft); }

  .bars{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; justify-content:safe center; gap:5px; overflow:hidden; }
  .bars.split{ flex-direction:row; gap:22px; align-items:center; }
  .ggroup{ display:flex; flex-direction:column; gap:5px; min-width:0; }
  .bars.split .ggroup{ flex:1; }
  .bars.split .bar{ grid-template-columns:minmax(0,120px) 1fr 30px; gap:8px; }
  .bars.split .bar .blab{ font-size:10.5px; }
  .bars.split .bar .bnum{ font-size:15px; }
  .gsub{
    font-size:8.5px; font-weight:600; letter-spacing:0.22em;
    text-transform:uppercase; color:var(--fainter);
    margin:4px 0 2px;
  }
  .bar{ display:grid; grid-template-columns:minmax(0,180px) 1fr 48px; align-items:center; gap:12px; }
  .bar .blab{
    font-size:11.5px; font-weight:500; color:var(--faint);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-align:right;
  }
  .bar.top .blab{ color:var(--paper); font-weight:600; }
  .bar .btrack{ height:12px; background:rgba(252,251,249,.06); position:relative; }
  .bar .bfill{
    position:absolute; inset:0 auto 0 0; width:0%;
    background:var(--red);
    transition:width .6s cubic-bezier(.22,.9,.35,1);
  }
  .bar.green .bfill{ background:var(--green); }
  .bar.grey .bfill{ background:rgba(252,251,249,.28); }
  .bar .bnum{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:17px; font-weight:540; color:var(--paper);
    text-align:left; line-height:1;
  }
  .bar .bnum.zero{ color:var(--fainter); }

  .empty{
    flex:1; display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-style:italic; font-size:15px;
    color:var(--fainter);
  }

  /* ---------- Q&A panel ---------- */
  .panel.qa{ border-top-color:var(--green); }
  .qlist{
    flex:1; min-height:0; overflow-y:auto;
    display:flex; flex-direction:column; gap:8px;
    padding-right:6px;
    scrollbar-width:thin; scrollbar-color:rgba(252,251,249,.2) transparent;
  }
  .qitem{
    border:1px solid var(--hairline);
    border-left:2px solid var(--green-soft);
    padding:9px 12px;
    cursor:pointer;
    transition:opacity .2s, border-color .2s;
  }
  .qitem .qwho{
    font-size:9.5px; font-weight:600; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--green-soft);
  }
  .qitem .qwho .qco{ color:var(--fainter); letter-spacing:0.1em; }
  .qitem .qtxt{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:14.5px; font-weight:440; line-height:1.35;
    color:var(--paper); margin-top:4px;
  }
  .qitem.answered{ opacity:.28; border-left-color:var(--fainter); }
  .qitem.answered .qwho{ color:var(--fainter); }
  .qitem:hover{ border-color:var(--faint); }

  /* ---------- focus mode ---------- */
  body.focus .grid{ display:block; margin-top:14px; }
  body.focus .panel{ display:none; }
  body.focus .panel.focused{
    display:flex; height:100%;
    padding:34px 60px 30px;
  }
  body.focus .panel.focused h2{ font-size:42px; margin-bottom:24px; }
  body.focus .panel.focused .pk{ font-size:12px; }
  body.focus .panel.focused .bars{ gap:12px; }
  body.focus .panel.focused .bars.split{ gap:60px; }
  body.focus .panel.focused .gsub{ font-size:12px; margin:10px 0 4px; }
  body.focus .panel.focused .ggroup{ gap:12px; }
  body.focus .panel.focused .bar,
  body.focus .panel.focused .bars.split .bar{ grid-template-columns:minmax(0,320px) 1fr 90px; gap:22px; }
  body.focus .panel.focused .bar .blab,
  body.focus .panel.focused .bars.split .bar .blab{ font-size:20px; }
  body.focus .panel.focused .bar .btrack{ height:30px; }
  body.focus .panel.focused .bar .bnum,
  body.focus .panel.focused .bars.split .bar .bnum{ font-size:44px; }
  body.focus .panel.focused .empty{ font-size:24px; }
  body.focus .panel.focused .qitem{ padding:14px 20px; }
  body.focus .panel.focused .qitem .qwho{ font-size:13px; }
  body.focus .panel.focused .qitem .qtxt{ font-size:26px; margin-top:8px; }

  footer{
    margin-top:12px;
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:10.5px; letter-spacing:0.06em; color:var(--fainter);
  }
  footer .keys b{ color:var(--faint); font-weight:600; }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="row">
      <div class="wordmark"><img src="pitchin_logo_white.svg" alt="pitchIN"></div>
      <h1>Raise Route — <em>Live Room Map</em></h1>
      <div class="live"><div class="dot" id="liveDot"></div><span id="liveLbl">Waiting…</span></div>
    </div>
    <div class="line"></div>
  </header>

  <div class="control">
    <span class="clab">Attendee gate</span>
    <div class="gatechips" id="gateChips"></div>
    <button class="opennext" id="openNext">Open next →</button>
    <span class="cstate" id="gateState">gate: connecting…</span>
  </div>

  <div class="strip" id="strip"></div>
  <div class="grid" id="grid"></div>

  <footer>
    <span>Ready to Raise? — Fundraising &amp; STO Readiness in Malaysia · Token-X Accelerator</span>
    <span class="keys">Press <b>0–4</b> to focus a checkpoint · <b>Q</b> for Q&amp;A · <b>Esc</b> for the grid</span>
  </footer>
</div>

<script>
(function(){
  "use strict";
  var SUPA_URL = "https://hhqlzcvwalwuxrrolevv.supabase.co";
  var SUPA_KEY = "sb_publishable_oNq7GfsgbZKELDhQbaRz_g_ctOO0v0p";
  var sb = null;
  try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, { auth:{ persistSession:false, autoRefreshToken:false } }); }
  catch(e){ console.warn("supabase unavailable", e); }

  var MAX_CP = 4;

  /* ---------- catalog (mirrors index.html answer shapes) ---------- */
  var OPTS = {
    cp0: [
      ["lt500k","< RM500k"],
      ["500k-3m","RM500k – 3M"],
      ["3-10m","RM3 – 10M"],
      ["gt10m","> RM10M"],
      ["not-raising","Not raising right now"]
    ],
    inst: [
      ["equity","Equity — a share"],
      ["debt","Debt — repay with interest"],
      ["token","A token"],
      ["notraise","Not looking to raise"],
      ["unsure","Not sure yet"]
    ],
    rails: [
      ["ecf","ECF"],
      ["tcf","TCF"],
      ["debtnotes","Debt & notes"],
      ["vc","VC / angels"],
      ["grants","Grants"],
      ["offshore","Labuan / offshore"],
      ["none","None yet","grey"]
    ],
    cp2: [
      ["fundraising","Fundraising — security","red"],
      ["asset","Asset-linked — wrapper first","grey"],
      ["product","Product territory","green"],
      ["grey","Grey zone","grey"]
    ],
    cp3: [
      ["asset","Asset & legal wrapper"],
      ["identity","Identity — KYC & AML"],
      ["settlement","Settlement — money leg"],
      ["custody","Custody — incl. self-custody"],
      ["partner","Partner for all of it","grey"]
    ],
    cp4: [
      ["launch","Launch-worthy (7–10)","green"],
      ["borderline","Borderline (4–6)","grey"],
      ["notyet","Adds nothing yet (0–3)","red"]
    ]
  };

  /* panels 0–4 = checkpoints; panel 5 = Q&A */
  var PANELS = [
    { pk:"Warm-up · CP0", h:"Raising in the next <em>12 months</em>",
      groups:[ { src:"cp0" } ] },
    { pk:"Checkpoint 1", h:"Your raise — <em>instrument &amp; rails</em>", split:true,
      groups:[ { label:"Instrument", src:"inst" }, { label:"Rails considering · multi", src:"rails" } ] },
    { pk:"Checkpoint 2", h:"The perimeter <em>verdict</em>",
      groups:[ { src:"cp2" } ] },
    { pk:"Checkpoint 3", h:"Weakest <em>layers</em> · up to 2",
      groups:[ { src:"cp3" } ] },
    { pk:"Checkpoint 4", h:"Launching a token — <em>worth it?</em>",
      groups:[ { src:"cp4" } ] }
  ];

  /* ---------- static scaffolding ---------- */
  var grid = document.getElementById("grid");
  grid.innerHTML = PANELS.map(function(p, i){
    return '<div class="panel" id="panel-' + i + '">' +
      '<div class="phead"><div class="pk">' + p.pk + '</div><div class="key">' + i + '</div></div>' +
      "<h2>" + p.h + "</h2>" +
      '<div class="bars' + (p.split ? " split" : "") + '" id="bars-' + i + '"></div>' +
    "</div>";
  }).join("") +
  '<div class="panel qa" id="panel-5">' +
    '<div class="phead"><div class="pk">Live Q&amp;A · <span id="qcount">0</span> question(s)</div><div class="key">Q</div></div>' +
    '<h2>From the <em>room</em> — tap to mark answered</h2>' +
    '<div class="qlist" id="qlist"><div class="empty">No questions yet — the floor is quiet.</div></div>' +
  "</div>";

  function esc(s){ return ("" + (s == null ? "" : s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  /* ---------- gate (session_state) ---------- */
  var gate = null; // last known open_checkpoint
  var gateChipsEl = document.getElementById("gateChips");
  var gateStateEl = document.getElementById("gateState");
  var openNextBtn = document.getElementById("openNext");

  function renderGate(){
    var html = "";
    for(var i=0;i<=MAX_CP;i++){
      var lit = gate !== null && i <= gate;
      var now = gate !== null && i === gate;
      html += '<button data-cp="' + i + '" class="' + (lit ? "lit" : "") + (now ? " now" : "") + '">CP' + i + "</button>";
    }
    gateChipsEl.innerHTML = html;
    gateChipsEl.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click", function(){ setGate(parseInt(b.getAttribute("data-cp"), 10)); });
    });
    openNextBtn.disabled = gate === null || gate >= MAX_CP;
    gateStateEl.innerHTML = gate === null
      ? "gate: connecting…"
      : "room is open through <b>CP" + gate + "</b>" + (gate >= MAX_CP ? " — all open" : " · next: CP" + (gate+1));
  }
  function setGate(n){
    if(!sb) return;
    sb.from("session_state").update({ open_checkpoint:n }).eq("id", 1).then(function(res){
      if(res.error){ console.warn("gate update failed", res.error); return; }
      gate = n; renderGate();
    }, function(err){ console.warn("gate update error", err); });
  }
  openNextBtn.addEventListener("click", function(){
    if(gate !== null && gate < MAX_CP) setGate(gate + 1);
  });
  renderGate();

  /* ---------- stats strip ---------- */
  function stripHTML(agg){
    function top(src, opts){
      var t = null;
      opts.forEach(function(o){
        var c = agg.c[src][o[0]] || 0;
        if(c > 0 && (!t || c > t.c)) t = { n:o[1], c:c };
      });
      return t ? t.n : "—";
    }
    var c2 = agg.c.cp2, c4 = agg.c.cp4;
    return (
      '<div class="stat hero"><div class="slab">Registered</div><div class="sval">' + agg.registered + ' <span class="unit">founders</span></div></div>' +
      '<div class="stat"><div class="slab">Completed routes</div><div class="sval">' + agg.completed + ' <span class="unit">of ' + agg.registered + '</span></div></div>' +
      '<div class="stat"><div class="slab">Top instrument</div><div class="sval">' + top("inst", OPTS.inst) + "</div></div>" +
      '<div class="stat"><div class="slab">Perimeter split</div><div class="sval"><span class="seg">' +
        (c2.fundraising||0) + '<small>sec</small>' + (c2.asset||0) + '<small>asset</small>' +
        (c2.product||0) + '<small>prod</small>' + (c2.grey||0) + '<small>grey</small></span></div></div>' +
      '<div class="stat"><div class="slab">Token worth it?</div><div class="sval"><span class="seg">' +
        (c4.launch||0) + '<small>yes</small>' + (c4.borderline||0) + '<small>mid</small>' + (c4.notyet||0) + '<small>not yet</small></span></div></div>'
    );
  }

  function barsHTML(src, opts, agg){
    var counts = agg.c[src];
    var max = 0, topKey = null;
    opts.forEach(function(o){
      var c = counts[o[0]] || 0;
      if(c > max){ max = c; topKey = o[0]; }
    });
    return opts.map(function(o){
      var c = counts[o[0]] || 0;
      var pct = max ? Math.round(c / max * 100) : 0;
      var tone = o[2] ? " " + o[2] : "";
      return '<div class="bar' + tone + (o[0] === topKey && c > 0 ? " top" : "") + '">' +
        '<div class="blab">' + o[1] + "</div>" +
        '<div class="btrack"><div class="bfill" data-w="' + pct + '"></div></div>' +
        '<div class="bnum' + (c === 0 ? " zero" : "") + '">' + c + "</div>" +
      "</div>";
    }).join("");
  }

  function renderPanels(agg){
    PANELS.forEach(function(p, i){
      var box = document.getElementById("bars-" + i);
      var any = false;
      p.groups.forEach(function(g){
        var counts = agg.c[g.src];
        for(var k in counts){ if(counts[k] > 0){ any = true; break; } }
      });
      if(!any){
        box.innerHTML = '<div class="empty">Waiting for the room…</div>';
        return;
      }
      box.innerHTML = p.groups.map(function(g){
        var inner = (g.label ? '<div class="gsub">' + g.label + "</div>" : "") + barsHTML(g.src, OPTS[g.src], agg);
        return p.split ? '<div class="ggroup">' + inner + "</div>" : inner;
      }).join("");
      requestAnimationFrame(function(){
        box.querySelectorAll(".bfill").forEach(function(f){
          f.style.width = f.getAttribute("data-w") + "%";
        });
      });
    });
  }

  /* ---------- aggregation ---------- */
  function aggregate(rows){
    var agg = { registered:0, completed:0,
      c:{ cp0:{}, inst:{}, rails:{}, cp2:{}, cp3:{}, cp4:{} } };
    function bump(src, key){
      if(key == null) return;
      agg.c[src][key] = (agg.c[src][key] || 0) + 1;
    }
    (rows || []).forEach(function(r){
      var a = r.answer || {};
      switch(r.checkpoint){
        case "cp0": agg.registered++; bump("cp0", a.raise); break;
        case "cp1":
          bump("inst", a.instrument);
          (a.rails || []).forEach(function(k){ bump("rails", k); });
          break;
        case "cp2": bump("cp2", a.verdict); break;
        case "cp3": (a.layers || []).forEach(function(k){ bump("cp3", k); });
          break;
        case "cp4": bump("cp4", a.verdict); break;
        case "cp5": agg.completed++; break;
      }
    });
    return agg;
  }

  /* ---------- Q&A feed ---------- */
  var questions = [];
  function renderQA(){
    var box = document.getElementById("qlist");
    document.getElementById("qcount").textContent = questions.filter(function(q){ return !q.answered; }).length;
    if(!questions.length){
      box.innerHTML = '<div class="empty">No questions yet — the floor is quiet.</div>';
      return;
    }
    box.innerHTML = questions.map(function(q){
      return '<div class="qitem' + (q.answered ? " answered" : "") + '" data-id="' + esc(q.id) + '">' +
        '<div class="qwho">' + esc(q.name || "Anonymous") + (q.company ? ' <span class="qco">· ' + esc(q.company) + "</span>" : "") + "</div>" +
        '<div class="qtxt">' + esc(q.text) + "</div>" +
      "</div>";
    }).join("");
    box.querySelectorAll(".qitem").forEach(function(el){
      el.addEventListener("click", function(){
        var id = el.getAttribute("data-id");
        var q = null;
        questions.forEach(function(x){ if("" + x.id === id) q = x; });
        if(!q) return;
        var next = !q.answered;
        q.answered = next; renderQA(); // optimistic
        if(sb) sb.from("questions").update({ answered:next }).eq("id", q.id).then(function(res){
          if(res.error){ console.warn("mark answered failed", res.error); q.answered = !next; renderQA(); }
        }, function(){ q.answered = !next; renderQA(); });
      });
    });
  }

  /* ---------- polling ---------- */
  var liveDot = document.getElementById("liveDot");
  var liveLbl = document.getElementById("liveLbl");
  var lastGood = 0;

  function poll(){
    if(!sb) return;
    // answers → tallies
    sb.from("answers").select("device_id,checkpoint,answer").then(function(res){
      if(res.error){ console.warn("poll failed", res.error); markStale(); return; }
      lastGood = Date.now();
      liveDot.classList.remove("stale");
      var agg = aggregate(res.data);
      liveLbl.textContent = "Live · " + agg.registered + " in";
      document.getElementById("strip").innerHTML = stripHTML(agg);
      renderPanels(agg);
    }, function(err){ console.warn("poll error", err); markStale(); });
    // gate → control strip
    sb.from("session_state").select("open_checkpoint").eq("id", 1).single().then(function(res){
      if(!res.error && res.data){ gate = res.data.open_checkpoint; renderGate(); }
    }, function(){});
    // questions → Q&A feed (newest first)
    sb.from("questions").select("id,created_at,name,company,text,answered")
      .order("created_at", { ascending:false })
      .then(function(res){
        if(res.error){ console.warn("questions poll failed", res.error); return; }
        questions = res.data || [];
        renderQA();
      }, function(){});
  }
  function markStale(){
    liveDot.classList.add("stale");
    liveLbl.textContent = "Reconnecting…";
  }
  setInterval(function(){
    if(Date.now() - lastGood > 15000) markStale();
  }, 5000);

  poll();
  setInterval(poll, 4000);

  /* ---------- keyboard: focus a panel ---------- */
  function focusPanel(i){
    document.body.classList.add("focus");
    for(var j=0;j<=5;j++){
      document.getElementById("panel-" + j).classList.toggle("focused", j === i);
    }
  }
  document.addEventListener("keydown", function(e){
    if(e.key >= "0" && e.key <= "4"){
      focusPanel(parseInt(e.key, 10));
    } else if(e.key === "q" || e.key === "Q"){
      focusPanel(5);
    } else if(e.key === "Escape"){
      document.body.classList.remove("focus");
      for(var j=0;j<=5;j++){
        document.getElementById("panel-" + j).classList.remove("focused");
      }
    }
  });

  // initial zero-state
  var zero = aggregate([]);
  document.getElementById("strip").innerHTML = stripHTML(zero);
  renderPanels(zero);
})();
</script>
</body>
</html>
