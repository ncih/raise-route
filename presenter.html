<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raise Route — Live Room Map · pitchIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --red:       #BF2026;
    --red-soft:  #E4555B;
    --red-tint:  #FEE2E3;
    --navy:      #1A1847;
    --navy-deep: #131134;
    --navy-card: #211E55;
    --green:     #0A994A;
    --green-soft:#4CC98A;
    --paper:     #FCFBF9;
    --faint:     rgba(252,251,249,.55);
    --fainter:   rgba(252,251,249,.35);
    --hairline:  rgba(252,251,249,.14);
    --serif: "Fraunces", Georgia, serif;
    --sans:  "Inter", -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:var(--navy-deep);
    color:var(--paper);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
  }

  .frame{
    height:100vh;
    display:flex; flex-direction:column;
    padding:28px 44px 24px;
    max-width:1920px; margin:0 auto;
  }

  /* ---------- header ---------- */
  header .row{
    display:flex; align-items:center; gap:22px;
  }
  .wordmark img{ display:block; height:40px; width:auto; }
  header h1{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:26px; font-weight:520; letter-spacing:-0.015em;
    color:var(--paper);
  }
  header h1 em{ font-style:italic; font-weight:440; color:var(--red-soft); }
  header .live{
    margin-left:auto;
    display:flex; align-items:center; gap:9px;
    font-size:10.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--faint);
  }
  header .live .dot{
    width:8px; height:8px; border-radius:50%; background:var(--green-soft);
    animation:pulse 1.6s ease-in-out infinite;
  }
  header .live .dot.stale{ background:#E18437; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.25} }
  header .line{ height:1px; background:var(--hairline); margin-top:16px; }

  /* ---------- room map strip ---------- */
  .strip{
    display:grid; grid-template-columns:repeat(5, 1fr);
    gap:1px; background:var(--hairline);
    border:1px solid var(--hairline);
    margin-top:18px;
  }
  .stat{
    background:var(--navy-deep);
    padding:14px 22px 16px;
  }
  .stat .slab{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--fainter);
  }
  .stat .sval{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:30px; font-weight:540; letter-spacing:-0.01em;
    color:var(--paper);
    margin-top:5px; line-height:1.1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .stat .sval .unit{ font-size:15px; color:var(--faint); font-style:italic; font-weight:440; }
  .stat .sval .seg{ font-size:22px; }
  .stat .sval .seg small{
    font-size:10px; font-family:var(--sans); font-weight:600;
    letter-spacing:0.14em; text-transform:uppercase; color:var(--fainter);
    margin:0 10px 0 4px;
  }
  .stat .sval .seg small:last-child{ margin-right:0; }
  .stat.hero .sval{ color:var(--red-soft); }

  /* ---------- panels grid ---------- */
  .grid{
    flex:1; min-height:0;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:1fr 1fr;
    gap:16px;
    margin-top:16px;
  }
  .panel{
    background:var(--navy-card);
    border:1px solid var(--hairline);
    border-top:2px solid var(--red);
    padding:18px 24px 16px;
    display:flex; flex-direction:column;
    min-height:0;
    position:relative;
  }
  .panel .phead{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:4px;
  }
  .panel .pk{
    font-size:9.5px; font-weight:600; letter-spacing:0.24em;
    text-transform:uppercase; color:var(--fainter);
  }
  .panel .key{
    font-family:var(--serif); font-style:italic; font-size:13px;
    color:var(--fainter);
  }
  .panel h2{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:19px; font-weight:520; letter-spacing:-0.01em;
    color:var(--paper); line-height:1.15;
    margin-bottom:12px;
  }
  .panel h2 em{ font-style:italic; font-weight:440; color:var(--red-soft); }

  .bars{ flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center; justify-content:safe center; gap:5px; }
  .bar{ display:grid; grid-template-columns:minmax(0,190px) 1fr 52px; align-items:center; gap:12px; }
  .bar .blab{
    font-size:12px; font-weight:500; color:var(--faint);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-align:right;
  }
  .bar.top .blab{ color:var(--paper); font-weight:600; }
  .bar .btrack{ height:14px; background:rgba(252,251,249,.06); position:relative; }
  .bar .bfill{
    position:absolute; inset:0 auto 0 0; width:0%;
    background:var(--red);
    transition:width .6s cubic-bezier(.22,.9,.35,1);
  }
  .bar.green .bfill{ background:var(--green); }
  .bar.grey .bfill{ background:rgba(252,251,249,.28); }
  .bar .bnum{
    font-family:var(--serif); font-optical-sizing:auto;
    font-size:18px; font-weight:540; color:var(--paper);
    text-align:left; line-height:1;
  }
  .bar .bnum.zero{ color:var(--fainter); }

  .empty{
    flex:1; display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-style:italic; font-size:15px;
    color:var(--fainter);
  }

  /* ---------- focus mode ---------- */
  body.focus .grid{ display:block; margin-top:16px; }
  body.focus .panel{ display:none; }
  body.focus .panel.focused{
    display:flex; height:100%;
    padding:34px 60px 30px;
  }
  body.focus .panel.focused h2{ font-size:42px; margin-bottom:24px; }
  body.focus .panel.focused .pk{ font-size:12px; }
  body.focus .panel.focused .bars{ gap:14px; }
  body.focus .panel.focused .bar{ grid-template-columns:minmax(0,420px) 1fr 110px; gap:24px; }
  body.focus .panel.focused .bar .blab{ font-size:22px; }
  body.focus .panel.focused .bar .btrack{ height:34px; }
  body.focus .panel.focused .bar .bnum{ font-size:56px; }
  body.focus .panel.focused .empty{ font-size:24px; }

  footer{
    margin-top:14px;
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:10.5px; letter-spacing:0.06em; color:var(--fainter);
  }
  footer .keys b{ color:var(--faint); font-weight:600; }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="row">
      <div class="wordmark"><img src="pitchin_logo_white.svg" alt="pitchIN"></div>
      <h1>Raise Route — <em>Live Room Map</em></h1>
      <div class="live"><div class="dot" id="liveDot"></div><span id="liveLbl">Waiting…</span></div>
    </div>
    <div class="line"></div>
  </header>

  <div class="strip" id="strip"></div>
  <div class="grid" id="grid"></div>

  <footer>
    <span>Ready to Raise? — Fundraising &amp; STO Readiness in Malaysia · Token-X Accelerator</span>
    <span class="keys">Press <b>0–5</b> to focus a checkpoint · <b>Esc</b> for the grid</span>
  </footer>
</div>

<script>
(function(){
  "use strict";
  var SUPA_URL = "https://hhqlzcvwalwuxrrolevv.supabase.co";
  var SUPA_KEY = "sb_publishable_oNq7GfsgbZKELDhQbaRz_g_ctOO0v0p";
  var sb = null;
  try { sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, { auth:{ persistSession:false, autoRefreshToken:false } }); }
  catch(e){ console.warn("supabase unavailable", e); }

  /* ---------- catalog (mirrors index.html) ---------- */
  var PANELS = [
    { cp:"cp0", pk:"Warm-up · CP0", h:"Raising in the next <em>12 months</em>",
      field:"raise",
      opts:[
        ["lt500k","< RM500k"],
        ["500k-3m","RM500k – 3M"],
        ["3-10m","RM3 – 10M"],
        ["gt10m","> RM10M"],
        ["not-raising","Token IS the product"]
      ]},
    { cp:"cp1", pk:"Checkpoint 1", h:"What are you <em>selling</em> to funders?",
      field:"choice",
      opts:[
        ["equity","Equity — a share"],
        ["debt","Debt — a promise to repay"],
        ["token","A token or product"],
        ["unsure","Not sure yet"]
      ]},
    { cp:"cp2", pk:"Checkpoint 2", h:"Which <em>rail</em> fits today?",
      field:"choice",
      opts:[
        ["ecf","ECF"],
        ["tcf","TCF"],
        ["debt","Debt & notes"],
        ["pks","PKS@Bursa"],
        ["vc","VC / grants first"],
        ["none","Not raising"]
      ]},
    { cp:"cp3", pk:"Checkpoint 3", h:"The perimeter <em>verdict</em>",
      field:"verdict",
      opts:[
        ["security","Security territory", "red"],
        ["likely","Likely a security", "red"],
        ["regime","Another regime", "green"],
        ["outside","Likely outside", "green"]
      ]},
    { cp:"cp4", pk:"Checkpoint 4", h:"The <em>weakest</em> layer",
      field:"choice",
      opts:[
        ["asset","Asset & legal wrapper"],
        ["identity","Identity — KYC & AML"],
        ["settlement","Settlement — money leg"],
        ["custody","Custody & transfer"],
        ["partner","Partner for all of it"]
      ]},
    { cp:"cp5", pk:"Checkpoint 5", h:"Is tokenisation <em>worth it?</em>",
      field:"verdict",
      opts:[
        ["worth","Worth it (7–10)", "green"],
        ["borderline","Borderline (4–6)", "grey"],
        ["traditional","Traditional wins (0–3)", "red"]
      ]}
  ];

  /* ---------- static scaffolding ---------- */
  var grid = document.getElementById("grid");
  grid.innerHTML = PANELS.map(function(p, i){
    return '<div class="panel" id="panel-' + i + '">' +
      '<div class="phead"><div class="pk">' + p.pk + '</div><div class="key">' + i + '</div></div>' +
      "<h2>" + p.h + "</h2>" +
      '<div class="bars" id="bars-' + i + '"></div>' +
    "</div>";
  }).join("");

  function stripHTML(agg){
    function top(i){
      var t = null;
      PANELS[i].opts.forEach(function(o){
        var c = agg.counts[i][o[0]] || 0;
        if(c > 0 && (!t || c > t.c)) t = { n:o[1], c:c };
      });
      return t ? t.n : "—";
    }
    var c3 = agg.counts[3], c5 = agg.counts[5];
    var sec = (c3.security||0) + (c3.likely||0);
    var reg = c3.regime||0, out = c3.outside||0;
    return (
      '<div class="stat hero"><div class="slab">Registered</div><div class="sval">' + agg.registered + ' <span class="unit">founders</span></div></div>' +
      '<div class="stat"><div class="slab">Top instrument</div><div class="sval">' + top(1) + "</div></div>" +
      '<div class="stat"><div class="slab">Top rail</div><div class="sval">' + top(2) + "</div></div>" +
      '<div class="stat"><div class="slab">Perimeter split</div><div class="sval"><span class="seg">' + sec + '<small>sec</small>' + reg + '<small>regime</small>' + out + '<small>outside</small></span></div></div>' +
      '<div class="stat"><div class="slab">Worth-it split</div><div class="sval"><span class="seg">' + (c5.worth||0) + '<small>yes</small>' + (c5.borderline||0) + '<small>mid</small>' + (c5.traditional||0) + '<small>trad</small></span></div></div>'
    );
  }

  function renderPanels(agg){
    PANELS.forEach(function(p, i){
      var box = document.getElementById("bars-" + i);
      var counts = agg.counts[i];
      var totalAnswered = 0, max = 0, topKey = null;
      p.opts.forEach(function(o){
        var c = counts[o[0]] || 0;
        totalAnswered += c;
        if(c > max){ max = c; topKey = o[0]; }
      });
      if(totalAnswered === 0){
        box.innerHTML = '<div class="empty">Waiting for the room…</div>';
        return;
      }
      box.innerHTML = p.opts.map(function(o){
        var c = counts[o[0]] || 0;
        var pct = max ? Math.round(c / max * 100) : 0;
        var tone = o[2] ? " " + o[2] : "";
        return '<div class="bar' + tone + (o[0] === topKey && c > 0 ? " top" : "") + '">' +
          '<div class="blab">' + o[1] + "</div>" +
          '<div class="btrack"><div class="bfill" data-w="' + pct + '"></div></div>' +
          '<div class="bnum' + (c === 0 ? " zero" : "") + '">' + c + "</div>" +
        "</div>";
      }).join("");
      // animate after paint
      requestAnimationFrame(function(){
        box.querySelectorAll(".bfill").forEach(function(f){
          f.style.width = f.getAttribute("data-w") + "%";
        });
      });
    });
  }

  /* ---------- polling ---------- */
  var liveDot = document.getElementById("liveDot");
  var liveLbl = document.getElementById("liveLbl");
  var lastGood = 0;

  function aggregate(rows){
    var agg = { registered:0, counts:[{},{},{},{},{},{}] };
    (rows || []).forEach(function(r){
      var idx = { cp0:0, cp1:1, cp2:2, cp3:3, cp4:4, cp5:5 }[r.checkpoint];
      if(idx == null || !r.answer) return;
      if(idx === 0) agg.registered++;
      var key = r.answer[PANELS[idx].field];
      if(key == null) return;
      agg.counts[idx][key] = (agg.counts[idx][key] || 0) + 1;
    });
    return agg;
  }

  function poll(){
    if(!sb) return;
    sb.from("answers").select("device_id,checkpoint,answer").then(function(res){
      if(res.error){
        console.warn("poll failed", res.error);
        markStale();
        return;
      }
      lastGood = Date.now();
      liveDot.classList.remove("stale");
      var agg = aggregate(res.data);
      liveLbl.textContent = "Live · " + agg.registered + " in";
      document.getElementById("strip").innerHTML = stripHTML(agg);
      renderPanels(agg);
    }, function(err){
      console.warn("poll error", err);
      markStale();
    });
  }
  function markStale(){
    liveDot.classList.add("stale");
    liveLbl.textContent = "Reconnecting…";
  }
  setInterval(function(){
    if(Date.now() - lastGood > 15000) markStale();
  }, 5000);

  poll();
  setInterval(poll, 4000);

  /* ---------- keyboard: focus a panel ---------- */
  document.addEventListener("keydown", function(e){
    if(e.key >= "0" && e.key <= "5"){
      var i = parseInt(e.key, 10);
      document.body.classList.add("focus");
      PANELS.forEach(function(_, j){
        document.getElementById("panel-" + j).classList.toggle("focused", j === i);
      });
    } else if(e.key === "Escape"){
      document.body.classList.remove("focus");
      PANELS.forEach(function(_, j){
        document.getElementById("panel-" + j).classList.remove("focused");
      });
    }
  });

  // initial zero-state
  var zero = aggregate([]);
  document.getElementById("strip").innerHTML = stripHTML(zero);
  renderPanels(zero);
})();
</script>
</body>
</html>
